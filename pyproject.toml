[build-system]
requires = ["setuptools>=42", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "scpn-control"
version = "0.15.0"
description = "SCPN Control — Neuro-symbolic Stochastic Petri Net controller for plasma control"
authors = [
    {name = "Miroslav Sotek", email = "protoscience@anulum.li"},
    {name = "Michal Reiprich"}
]
keywords = ["tokamak", "plasma-control", "petri-net", "snn", "Kuramoto"]
license = "MIT OR Apache-2.0"
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Rust",
    "Topic :: Scientific/Engineering :: Physics",
]
readme = "README.md"
dependencies = [
    "numpy>=1.24",
    "scipy>=1.10",
    "click>=8.0",
]
requires-python = ">=3.9"

[project.urls]
Homepage = "https://github.com/anulum/scpn-control"
Documentation = "https://anulum.github.io/scpn-control/"
Repository = "https://github.com/anulum/scpn-control"
"Bug Tracker" = "https://github.com/anulum/scpn-control/issues"
Discussions = "https://github.com/anulum/scpn-control/discussions"
Changelog = "https://github.com/anulum/scpn-control/blob/main/CHANGELOG.md"

[project.optional-dependencies]
viz = ["matplotlib>=3.5"]
dashboard = ["streamlit>=1.20", "matplotlib>=3.5"]
hdf5 = ["h5py>=3.0"]
ws = ["websockets>=12.0"]
ml = ["torch>=2.0"]
jax = ["jax>=0.4.20", "jaxlib>=0.4.20"]
neuro = ["sc-neurocore>=3.8.0"]
nengo = ["nengo>=4.0"]
loihi = ["nengo>=4.0", "nengo-loihi>=1.0"]
rl = ["stable-baselines3>=2.0", "gymnasium>=0.29"]
benchmark = ["freegs>=0.6"]
docs = [
    "mkdocs-material>=9.5",
    "mkdocstrings[python]>=0.27",
    "pymdown-extensions>=10.0",
]
precommit = ["pre-commit>=4.0"]
all = [
    "matplotlib>=3.5",
    "streamlit>=1.20",
    "h5py>=3.0",
    "websockets>=12.0",
    "torch>=2.0",
    "jax>=0.4.20",
    "jaxlib>=0.4.20",
    "nengo>=4.0",
    "stable-baselines3>=2.0",
    "gymnasium>=0.29",
    "freegs>=0.6",
]
dev = [
    "pytest>=7.0",
    "pytest-cov>=5.0",
    "hypothesis>=6.0",
    "mypy>=1.10",
    "ruff>=0.4",
    "bandit>=1.7",
    "matplotlib>=3.5",
    "streamlit>=1.20",
    "torch>=2.0",
    "nengo>=4.0",
    "pre-commit>=4.0",
]

[project.scripts]
scpn-control = "scpn_control.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.mypy]
strict = false
warn_return_any = true
warn_unused_configs = true
check_untyped_defs = true
disallow_untyped_defs = true
ignore_missing_imports = true
files = [
    "src/scpn_control/",
]

[[tool.mypy.overrides]]
module = ["matplotlib", "matplotlib.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["streamlit", "streamlit.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["nengo", "nengo.*", "nengo_loihi", "nengo_loihi.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["torch", "torch.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["scipy", "scipy.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
pythonpath = ["src", "tests", "."]
addopts = "--strict-markers"
markers = [
    "slow: marks long-running regression tests",
]
filterwarnings = [
    "error::DeprecationWarning",
    "ignore:.*oneOf.*[dD]eprecated.*:Warning",
    "default::UserWarning",
]
xfail_strict = true

[tool.coverage.run]
source = ["scpn_control"]

[tool.coverage.report]
fail_under = 99
exclude_lines = [
    "pragma: no cover",
    "if __name__",
    "raise NotImplementedError",
    "if HAS_TORCH",
    "if HAS_NENGO",
    "if HAS_SC_NEUROCORE",
    "if HAS_JAX",
    "except ImportError",
]

[tool.ruff]
line-length = 120
target-version = "py39"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM"]
ignore = [
    "E402",   # module-level import after try/except (conditional deps)
    "E501",   # line length handled by formatter
    "E741",   # ambiguous variable (physics code uses l, I, O)
    "I001",   # import sorting (enable once codebase is clean)
    "UP006", "UP012", "UP015", "UP031", "UP034", "UP035", "UP037", "UP045",
    "F841",   # unused variable (common in demo/experiment scripts)
    "SIM102", "SIM105", "SIM108", "SIM300",
    "B007", "B017", "B018", "B023", "B028", "B904", "B905",
]

[tool.ruff.lint.isort]
known-first-party = ["scpn_control"]

[tool.bandit]
exclude_dirs = ["tests", "examples"]
skips = ["B101"]
