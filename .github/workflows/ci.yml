# SCPN Control — GitHub Actions continuous integration workflow.
name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  PYTHONPATH: ${{ github.workspace }}/src

jobs:
  # ─── Job 1: Python tests ───
  python-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        include:
          - os: windows-2025
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          pip install --require-hashes -r requirements/ci-deps.txt
          pip install --require-hashes -r requirements/ci-test.txt
      - name: Install studio platform SDK (ubuntu 3.12 only)
        # The studio vertical (scpn_control.studio) consumes the published
        # scpn-studio-platform SDK; install it on the job that runs mypy + the
        # 100% coverage gate so tests/test_studio_vertical.py executes (it
        # importorskips elsewhere) and the studio modules are covered.
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        # Hash-pinned via a pip-compile --generate-hashes requirements file (the SDK
        # has no transitive deps); --hash is only honoured inside a requirements file.
        run: pip install --require-hashes -r requirements/ci-studio.txt
      - name: Test
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: pytest -p hypothesis.extra.pytestplugin tests/ -v --tb=short -x
      - name: Mypy (ubuntu 3.12 only)
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        run: python -m mypy
        timeout-minutes: 10
      - name: Test quality policy
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        run: python tools/check_test_quality_policy.py
      - name: Coverage (ubuntu 3.12 only)
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
          JAX_ENABLE_X64: "1"
          CUDA_VISIBLE_DEVICES: ""
        run: |
          pip install --require-hashes -r requirements/ci-viz.txt
          pip install --require-hashes -r requirements/ci-hdf5.txt
          pip install --require-hashes -r requirements/ci-jax.txt
          pytest -p hypothesis.extra.pytestplugin -p pytest_cov tests/ --cov=scpn_control --cov-report=xml --cov-report=term --cov-fail-under=100
          mkdir -p artifacts/coverage/python
          cp .coverage artifacts/coverage/python/.coverage.python
      - name: Upload coverage artifact
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: coverage-report
          path: coverage.xml
      - name: Upload Python coverage data
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: coverage-data-python
          path: artifacts/coverage/python/.coverage.python
          include-hidden-files: true
      - name: Upload to Codecov
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v6
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          # Coverage is gated locally by the --cov-fail-under step above; the
          # upload to the external Codecov dashboard must not fail CI on a
          # transient uploader/GPG signature problem.
          fail_ci_if_error: false

  # ─── Job: Control Studio web remote (Module Federation 2.x) ───
  studio-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: studio-web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "22"
      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@11.2.2 --activate
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Format check
        run: pnpm format:check
      - name: Tests + coverage gate
        run: pnpm exec vitest run --coverage
      - name: Build (Module Federation remote)
        run: pnpm build
      - name: Detect Studio deploy credentials
        id: studio-deploy-credentials
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          SCPN_CONTROL_STUDIO_DEPLOY_KEY: ${{ secrets.SCPN_CONTROL_STUDIO_DEPLOY_KEY }}
          SCPN_CONTROL_STUDIO_KNOWN_HOSTS: ${{ secrets.SCPN_CONTROL_STUDIO_KNOWN_HOSTS }}
        run: |
          if [ -n "$SCPN_CONTROL_STUDIO_DEPLOY_KEY" ] && [ -n "$SCPN_CONTROL_STUDIO_KNOWN_HOSTS" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Configure Studio deploy SSH
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.studio-deploy-credentials.outputs.configured == 'true'
        env:
          SCPN_CONTROL_STUDIO_DEPLOY_KEY: ${{ secrets.SCPN_CONTROL_STUDIO_DEPLOY_KEY }}
          SCPN_CONTROL_STUDIO_KNOWN_HOSTS: ${{ secrets.SCPN_CONTROL_STUDIO_KNOWN_HOSTS }}
        run: |
          test -n "$SCPN_CONTROL_STUDIO_DEPLOY_KEY"
          test -n "$SCPN_CONTROL_STUDIO_KNOWN_HOSTS"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SCPN_CONTROL_STUDIO_DEPLOY_KEY" > ~/.ssh/scpn-control-studio-ci-deploy
          chmod 600 ~/.ssh/scpn-control-studio-ci-deploy
          printf '%s\n' "$SCPN_CONTROL_STUDIO_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
      - name: Deploy Studio remote
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.studio-deploy-credentials.outputs.configured == 'true'
        run: |
          test -f dist/remoteEntry.js
          test -f dist/manifest.json
          test -f dist/studio-feed.json
          rsync -az --delete \
            -e "ssh -i ~/.ssh/scpn-control-studio-ci-deploy -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes" \
            dist/ deploy@www.anulum.org:

  # ─── Job 2: Notebook smoke tests ───
  notebook-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
      - name: Install notebook dependencies
        run: |
          pip install --require-hashes -r requirements/ci-deps.txt
          pip install --require-hashes -r requirements/ci-viz.txt
          pip install --require-hashes -r requirements/ci-notebook.txt
      - name: Execute notebooks
        run: |
          mkdir -p artifacts/notebook-exec
          NOTEBOOKS=(
            "examples/q10_breakeven_demo.ipynb"
            "examples/snn_compiler_walkthrough.ipynb"
            "examples/paper27_phase_dynamics_demo.ipynb"
            "examples/h_infinity_controller_demo.ipynb"
            "examples/frontier_physics_demo.ipynb"
            "examples/advanced_control_demo.ipynb"
          )

          if python -c "import importlib.util, sys; sys.exit(0 if importlib.util.find_spec('sc_neurocore') is not None else 1)"
          then
            NOTEBOOKS+=("examples/neuro_symbolic_control_demo.ipynb")
          else
            echo "Skipping examples/neuro_symbolic_control_demo.ipynb (sc_neurocore not available)"
          fi

          for nb in "${NOTEBOOKS[@]}"; do
            jupyter nbconvert --to notebook --execute --ExecutePreprocessor.timeout=900 --output-dir artifacts/notebook-exec "$nb"
          done
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: executed-notebooks
          path: artifacts/notebook-exec/

  # ─── Job 2b: Tutorial script smoke tests ───
  tutorial-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install --require-hashes -r requirements/ci-deps.txt
          pip install --require-hashes -r requirements/ci-viz.txt
      - name: Run tutorial 01 (closed-loop control)
        run: PYTHONIOENCODING=utf-8 python examples/tutorial_01_closed_loop_control.py
        timeout-minutes: 5
      - name: Run tutorial 04 (neural transport)
        run: PYTHONIOENCODING=utf-8 python examples/tutorial_04_neural_transport.py
        timeout-minutes: 5
      - name: Run tutorial 05 (phase dynamics)
        run: PYTHONIOENCODING=utf-8 python examples/tutorial_05_adaptive_phase_dynamics.py
        timeout-minutes: 5

  # ─── Job 3: Package quality gate ───
  package-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
      - name: Install packaging tools
        run: pip install --require-hashes -r requirements/ci-build.txt
      - name: Build package
        run: python -m build
      - name: Validate package metadata
        run: python -m twine check dist/*
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: python-dist
          path: dist/

  # ─── Job 4: Python dependency audit ───
  python-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
      - name: Install project and audit tools
        run: |
          pip install --require-hashes -r requirements/ci-deps.txt
          pip install --require-hashes -r requirements/ci-audit.txt
      - name: Run pip audit
        run: python -m pip_audit

  # ─── Job 4b: Data manifest provenance gate ───
  data-manifest-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
      - name: Validate data manifests
        run: python validation/validate_data_manifests.py --output-json artifacts/data_manifest_report.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: data-manifest-report
          path: artifacts/data_manifest_report.json

  # ─── Job 4c: Capability manifest gate ───
  capability-manifest-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
      - name: Validate capability manifest
        run: |
          python tools/capability_manifest.py --check
          python tools/check_studio_deploy_key.py
          python tools/check_studio_offline_sealing.py
          python tools/sync_studio_web_manifest.py --check

  # ─── Job 4d: Release evidence gate ───
  release-evidence-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
      - name: Install validation dependencies
        run: pip install --require-hashes -r requirements/ci-deps.txt
      - name: Validate release evidence
        run: |
          mkdir -p artifacts
          python -m scpn_control.cli validate --json-out > artifacts/release_evidence_report.json
          python -m scpn_control.cli validate-release-evidence artifacts/release_evidence_report.json --json-out > artifacts/release_evidence_admission.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: release-evidence-report
          path: |
            artifacts/release_evidence_report.json
            artifacts/release_evidence_admission.json

  # ─── Job 5: RMSE gate ───
  rmse-gate:
    needs: python-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
      - name: Install
        run: |
          pip install --require-hashes -r requirements/ci-deps.txt
          pip install --require-hashes -r requirements/ci-viz.txt
      - name: RMSE Dashboard
        run: python validation/rmse_dashboard.py --output-json artifacts/rmse_dashboard_ci.json --output-md artifacts/rmse_dashboard_ci.md
      - name: RMSE Gate
        run: python tools/ci_rmse_gate.py

  # ─── Job 6: Rust tests ───
  rust-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scpn-control-rs
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
        with:
          components: rustfmt, clippy
      - name: Format check
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy -- -D warnings
      - name: Test
        run: cargo test --workspace --exclude scpn-control-rs

  # ─── Job 7: Rust-Python interop ───
  rust-python-interop:
    needs: rust-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
      - name: Create virtualenv
        run: python -m venv .venv
      - name: Install toolchain deps
        run: |
          . .venv/bin/activate
          pip install --require-hashes -r requirements/ci-deps.txt
          pip install --require-hashes -r requirements/ci-test.txt
          pip install --require-hashes -r requirements/ci-interop.txt
      - name: Build Rust bindings
        run: |
          . .venv/bin/activate
          cd scpn-control-rs/crates/control-python
          python -m maturin develop --release
      - name: Verify Rust bindings
        run: |
          . .venv/bin/activate
          PYTHONPATH=$PWD/src python - <<'PY'
          import importlib.util
          from scpn_control.core._rust_compat import _rust_available

          if importlib.util.find_spec("scpn_control_rs") is None:
              raise SystemExit("scpn_control_rs module missing after maturin develop")
          if not _rust_available():
              raise SystemExit("Rust compatibility layer reports unavailable backend")
          print("Rust bindings import and compatibility probe passed.")
          PY
      - name: Parity tests
        run: |
          . .venv/bin/activate
          PYTHONPATH=$PWD/src PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 COVERAGE_FILE=.coverage.rust python -m coverage run --context=rust-present --source=scpn_control -m pytest -p hypothesis.extra.pytestplugin tests/test_rust_python_parity.py tests/test_rust_compat_wrapper.py tests/test_snn_pyo3_bridge.py -v
          mkdir -p artifacts/coverage/rust
          mv .coverage.rust artifacts/coverage/rust/.coverage.rust
      - name: Upload Rust-present coverage data
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: coverage-data-rust
          path: artifacts/coverage/rust/.coverage.rust
          include-hidden-files: true

  native-coverage-combine:
    needs: [python-tests, rust-python-interop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
      - name: Install coverage tooling
        run: |
          pip install --require-hashes -r requirements/ci-deps.txt
          pip install --require-hashes -r requirements/ci-test.txt
      - name: Download Python coverage data
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0  # v6
        with:
          name: coverage-data-python
          path: artifacts/coverage/python
      - name: Download Rust-present coverage data
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0  # v6
        with:
          name: coverage-data-rust
          path: artifacts/coverage/rust
      - name: Verify native coverage matrix
        run: python tools/native_coverage_matrix.py
      - name: Combine coverage data
        run: |
          python -m coverage combine --keep artifacts/coverage/python artifacts/coverage/rust
          python -m coverage xml -o coverage.xml
          python -m coverage report --fail-under=100
      - name: Upload combined coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: coverage-report-combined
          path: coverage.xml
      - name: Upload combined coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v6
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ─── Job 8: Rust benchmarks ───
  rust-benchmarks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scpn-control-rs
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
      - name: Bench
        run: cargo bench --workspace --exclude scpn-control-rs
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: bench-results
          path: scpn-control-rs/target/criterion/

  # ─── Job 9: Python phase-sync benchmark (DIII-D scale) ───
  python-benchmark:
    needs: python-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
      - name: Install
        run: pip install --require-hashes -r requirements/ci-deps.txt
      - name: Kuramoto benchmark (DIII-D scale)
        run: |
          python - <<'PY'
          import time
          import numpy as np
          from scpn_control.phase.kuramoto import kuramoto_sakaguchi_step
          from scpn_control.phase.realtime_monitor import RealtimeMonitor

          rng = np.random.default_rng(42)

          # Single-step latency at DIII-D scale (N=1000, 4096)
          for N in (1000, 4096):
              theta = rng.uniform(-np.pi, np.pi, N)
              omega = rng.normal(0, 0.3, N)
              times = []
              for _ in range(200):
                  t0 = time.perf_counter()
                  kuramoto_sakaguchi_step(theta, omega, dt=1e-3, K=2.0, zeta=0.5,
                                         psi_driver=0.3, psi_mode="external")
                  times.append(time.perf_counter() - t0)
              p50 = sorted(times)[len(times) // 2] * 1e3
              print(f"N={N:>5d}  P50={p50:.3f} ms")
              assert p50 < 5.0, f"N={N} P50={p50:.3f} ms exceeds 5 ms budget"

          # RealtimeMonitor tick (16 layers × 50 oscillators)
          mon = RealtimeMonitor.from_paper27(L=16, N_per=50)
          tick_times = []
          for _ in range(100):
              t0 = time.perf_counter()
              mon.tick()
              tick_times.append(time.perf_counter() - t0)
          p50_tick = sorted(tick_times)[len(tick_times) // 2] * 1e6
          print(f"RealtimeMonitor tick P50={p50_tick:.0f} µs")
          assert p50_tick < 50_000, f"Tick P50={p50_tick:.0f} µs exceeds 50 ms budget"

          print("All benchmark gates passed.")
          PY
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: python-bench-results
          path: "*.json"
          if-no-files-found: ignore

  # ─── Job 10: E2E mock DIII-D shot test ───
  e2e-diiid:
    needs: python-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
      - name: Install
        run: |
          pip install --require-hashes -r requirements/ci-deps.txt
          pip install --require-hashes -r requirements/ci-test.txt
          pip install --require-hashes -r requirements/ci-hdf5.txt
      - name: E2E mock DIII-D + trajectory export
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest tests/test_e2e_phase_diiid.py -v --tb=short
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: e2e-diiid-results
          path: "*.json"
          if-no-files-found: ignore

  # ─── Job 10b: Synthetic DIII-D reference fixture validation ───
  synthetic-diiid-reference:
    needs: python-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
      - name: Install
        run: |
          pip install --require-hashes -r requirements/ci-deps.txt
          pip install --require-hashes -r requirements/ci-test.txt
      - name: Validate synthetic DIII-D reference fixtures
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: pytest tests/test_synthetic_diiid_reference_shots.py -v --tb=short

  # ─── Job 11: Python lint (ruff) ───
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install --require-hashes -r requirements/ci-lint.txt
      - name: Ruff check
        run: ruff check src/scpn_control/
      - name: Ruff format check
        run: ruff format --check src/scpn_control/ tests/
      - name: Changelog mirror sync
        run: python tools/check_changelog_sync.py
      - name: Documentation coverage
        run: python tools/check_docs_coverage.py
      - name: Public-API docstring coverage
        run: python tools/run_docstring_gate.py
      - name: JOSS submission guard
        run: python tools/check_joss_submission.py
      - name: Public surface hygiene
        run: python tools/check_public_surface_hygiene.py

  # ─── Job 12: Python security scan (Bandit) ───
  python-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
      - name: Install Bandit
        run: pip install --require-hashes -r requirements/ci-security.txt
      - name: Run Bandit
        run: bandit -r src/scpn_control/ -c pyproject.toml -ll -f json -o bandit-report.json
      - name: Summary
        run: bandit -r src/scpn_control/ -c pyproject.toml -ll -f screen
      - name: GitHub installation token format readiness
        run: python tools/check_github_token_format_readiness.py
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: bandit-report
          path: bandit-report.json

  # ─── Job 13: Pre-commit hooks ───
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
        with:
          components: rustfmt, clippy
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
      - name: Install
        run: pip install --require-hashes -r requirements/ci-precommit.txt
      - name: Run pre-commit
        run: pre-commit run --all-files

  # ─── Job 14: Rust audit ───
  rust-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scpn-control-rs
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Audit
        run: cargo audit

  # ─── Job 15: Rust supply-chain policy (cargo-deny) ───
  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe  # v2
        with:
          manifest-path: scpn-control-rs/Cargo.toml

  # ─── Job 16: JAX backend parity ───
  jax-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
      - name: Install
        run: |
          pip install --require-hashes -r requirements/ci-deps.txt
          pip install --require-hashes -r requirements/ci-test.txt
          pip install --require-hashes -r requirements/ci-jax.txt
      - name: JAX runtime + solver tests
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
          JAX_ENABLE_X64: "1"
        run: |
          pytest -p hypothesis.extra.pytestplugin tests/test_jax_traceable_runtime.py -v --tb=short
          pytest tests/test_jax_solvers.py -v --tb=short
          pytest tests/test_jax_neural_equilibrium.py -v --tb=short
      - name: Persisted GK parity evidence gate
        run: |
          python validation/validate_jax_gk_parity.py \
            --artifact-root validation/reports/jax_gk_parity \
            --require-parity-artifacts \
            --require-cases cyclone_base_case,tem_kinetic_electron,stable_mode \
            --require-backends cpu,gpu

  # ─── Job 17: Nengo Loihi emulator ───
  nengo-loihi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
      - name: Install
        run: |
          pip install --require-hashes -r requirements/ci-deps.txt
          pip install --require-hashes -r requirements/ci-test.txt
          pip install --require-hashes -r requirements/ci-nengo.txt
      - name: Nengo tests
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: pytest tests/test_nengo_snn_wrapper.py -v --tb=short

  # ─── Job 18: Lean formal proofs ───
  lean-proofs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9  # v1.5.0
        with:
          use-github-cache: true
          test: false
          lint: false

  # ─── Job 19: Evidence inventory (informative, non-gating) ───
  # Publishes the validation-report freshness inventory and the evidence
  # gap matrix as build artifacts. Deliberately does NOT pass
  # --fail-on-stale: WCG-5e enables enforcement only after the stale
  # inventory is rerun or explicitly waived (docs/internal TODO).
  evidence-inventory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
      - name: Generate freshness inventory and evidence gap matrix
        run: |
          mkdir -p evidence-inventory
          python tools/validation_report_freshness.py \
            --output-json evidence-inventory/validation_report_freshness.json \
            --output-md evidence-inventory/validation_report_freshness.md
          python tools/evidence_gap_matrix.py \
            --output-json evidence-inventory/evidence_gap_matrix.json \
            --output-md evidence-inventory/evidence_gap_matrix.md
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: evidence-inventory
          path: evidence-inventory/
