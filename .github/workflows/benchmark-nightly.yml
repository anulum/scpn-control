# SCPN Control — Nightly polyglot benchmark suite and regression-gate evidence.
#
# Separate from per-commit CI (where `rust-benchmarks` and `python-benchmark`
# are the fast smoke checks). This builds the Rust PyO3 extension, runs the
# Python/Rust comparison suite, and runs the regression gate in evidence-only
# mode: a GitHub-hosted runner's CPU differs from the declared-hardware baseline,
# so latency comparison is collected and uploaded but does not block. The gate is
# meant to fail builds only on declared/self-hosted hardware whose baseline was
# captured on the same CPU.
name: Benchmark nightly
on:
  schedule:
    - cron: "37 4 * * *"
  workflow_dispatch:

permissions: {}

concurrency:
  group: benchmark-nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
      - name: Create virtualenv and install toolchain deps
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --require-hashes -r requirements/ci-deps.txt
          pip install --require-hashes -r requirements/ci-test.txt
          pip install --require-hashes -r requirements/ci-interop.txt
      - name: Build Rust extension
        run: |
          . .venv/bin/activate
          cd scpn-control-rs/crates/control-python
          python -m maturin develop --release
      - name: Build acados + install casadi (optional MPC backends)
        continue-on-error: true
        run: |
          . .venv/bin/activate
          pip install casadi
          git clone --depth 1 https://github.com/acados/acados.git "$RUNNER_TEMP/acados"
          cd "$RUNNER_TEMP/acados"
          git submodule update --init --recursive
          cmake -S . -B build -DACADOS_WITH_OSQP=ON -DACADOS_PYTHON=ON -DBLASFEO_TARGET=GENERIC
          cmake --build build --target install -j"$(nproc)"
          pip install -e interfaces/acados_template
          ACADOS_SOURCE_DIR="$RUNNER_TEMP/acados" bash -c 'echo y | python -c "from acados_template.utils import get_tera; get_tera()"'
          echo "ACADOS_SOURCE_DIR=$RUNNER_TEMP/acados" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$RUNNER_TEMP/acados/lib:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
      - name: Run benchmark suite
        run: |
          . .venv/bin/activate
          PYTHONPATH=$PWD/src python tools/run_benchmark_suite.py \
            --steps 400 --warmup 40 \
            --json-out artifacts/benchmarks/suite_report.json
      - name: Native-handoff control-loop latency (P50/P95/P99, canonical)
        run: |
          . .venv/bin/activate
          PYTHONPATH=$PWD/src python scripts/benchmark_native_handoff.py \
            --steps 5000 --repeats 7 --warmup 2 \
            --json-out artifacts/benchmarks/native_handoff_comparison.json \
            --markdown-out artifacts/benchmarks/native_handoff_comparison.md
      - name: Per-controller step latency (P50/P95/P99, canonical)
        run: |
          . .venv/bin/activate
          PYTHONPATH=$PWD/src python benchmarks/controller_latency.py \
            --iterations 2000 --warmup 200 \
            --json-out artifacts/benchmarks/controller_latency.json \
            --markdown-out artifacts/benchmarks/controller_latency.md
      - name: Regression gate (evidence-only on hosted runner)
        run: |
          . .venv/bin/activate
          python tools/benchmark_regression_gate.py \
            --report artifacts/benchmarks/suite_report.json \
            --baseline benchmarks/baselines/capacitor_bank.json \
            --thresholds benchmarks/regression_thresholds.toml \
            --json-out artifacts/benchmarks/gate_verdict.json \
            --evidence-only
      - name: Upload benchmark evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: benchmark-regression-evidence
          path: artifacts/benchmarks/
