name: Release

on:
  push:
    tags: ["v*"]

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"

      - name: Build sdist and SBOM
        run: |
          pip install --require-hashes -r requirements/ci-release.txt
          python -m build --sdist
          cyclonedx-py environment -o sbom.json --output-format json

      - name: Extract changelog for this tag
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          awk "/^## \[?${VERSION}/,/^## \[?[0-9]/" CHANGELOG.md \
            | head -n -1 > /tmp/release_notes.md
          echo "notes_file=/tmp/release_notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3
        with:
          body_path: ${{ steps.changelog.outputs.notes_file }}
          generate_release_notes: false
          files: |
            dist/*.tar.gz
            sbom.json
