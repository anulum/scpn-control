name: Release

on:
  push:
    tags: ["v*"]

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          fetch-depth: 0

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"

      - name: Build sdist and SBOM
        run: |
          pip install --require-hashes -r requirements/ci-release.txt
          python -m build --sdist
          cyclonedx-py environment -o sbom.json --output-format json

      - name: Extract changelog for this tag
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          awk "/^## \[?${VERSION}/,/^## \[?[0-9]/" CHANGELOG.md \
            | head -n -1 > /tmp/release_notes.md
          echo "notes_file=/tmp/release_notes.md" >> "$GITHUB_OUTPUT"

      - name: Generate artifact SHA-256 checksums
        run: |
          sha256sum dist/*.tar.gz sbom.json | tee SHA256SUMS.txt
          {
            printf '\n## Artifact SHA-256 checksums\n\n```\n'
            cat SHA256SUMS.txt
            printf '```\n'
          } >> /tmp/release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228  # v3
        with:
          body_path: ${{ steps.changelog.outputs.notes_file }}
          generate_release_notes: false
          files: |
            dist/*.tar.gz
            sbom.json
            SHA256SUMS.txt
