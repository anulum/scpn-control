version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "github_actions"
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "python"

  - package-ecosystem: "cargo"
    directory: "/scpn-control-rs"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps(rust)"
    ignore:
      - dependency-name: "ndarray"
        versions:
          - ">= 0.17.0"
      - dependency-name: "rand"
        versions:
          - ">= 0.9.0"
      - dependency-name: "rand_distr"
        versions:
          - ">= 0.5.0"
    labels:
      - "dependencies"
      - "rust"
