repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        args: [--unsafe]
      - id: check-toml
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^src/
      - id: ruff-format
        files: ^(src/|tests/)

  - repo: https://github.com/crate-ci/typos
    rev: v1.29.5
    hooks:
      - id: typos

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.2.0
    hooks:
      - id: mypy
        pass_filenames: false
        # Pin to the same versions as requirements/ so the pre-commit mypy stubs
        # match the CI mypy job exactly; an unpinned numpy pulls newer stubs that
        # report spurious dtype errors absent under the repo-pinned numpy==2.2.6.
        additional_dependencies: [numpy==2.2.6, scipy==1.15.3, osqp==1.1.3, click==8.4.1, pydantic==2.13.4]

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: bash -c 'cd scpn-control-rs && cargo fmt --check'
        language: system
        pass_filenames: false

      - id: check-version-sync
        name: version consistency
        entry: python tools/check_version_sync.py
        language: system
        pass_filenames: false
        files: (pyproject\.toml|CITATION\.cff|\.zenodo\.json|docs/api\.md)

      - id: check-changelog-sync
        name: changelog mirror sync
        entry: python tools/check_changelog_sync.py
        language: system
        pass_filenames: false
        files: ^(CHANGELOG\.md|docs/changelog\.md|tools/check_changelog_sync\.py)

      - id: check-docs-coverage
        name: documentation coverage
        entry: python tools/check_docs_coverage.py
        language: system
        pass_filenames: false
        files: ^(src/scpn_control/|docs/api\.md|tools/check_docs_coverage\.py)

      - id: check-commit-authorship
        name: commit authorship line
        entry: python tools/check_commit_authorship.py
        language: system
        stages: [commit-msg]
