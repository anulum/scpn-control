repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        args: [--unsafe]
      - id: check-toml
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^src/
      - id: ruff-format
        files: ^(src/|tests/)

  - repo: https://github.com/crate-ci/typos
    rev: v1.29.5
    hooks:
      - id: typos

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        pass_filenames: false
        additional_dependencies: [numpy>=1.24, scipy>=1.10, click>=8.0]

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: bash -c 'cd scpn-control-rs && cargo fmt --check'
        language: system
        pass_filenames: false

      - id: check-version-sync
        name: version consistency
        entry: python tools/check_version_sync.py
        language: system
        pass_filenames: false
        files: (pyproject\.toml|CITATION\.cff|\.zenodo\.json|docs/api\.md)
